name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      deploy_frontend:
        description: "Deploy frontend (Vercel)"
        required: true
        default: true
        type: boolean
      deploy_backend:
        description: "Deploy backend (Render)"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: cd-${{ github.event_name }}-${{ github.ref_name || github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  prepare:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      deploy_sha: ${{ steps.meta.outputs.deploy_sha }}
      deploy_environment: ${{ steps.meta.outputs.deploy_environment }}
      deploy_frontend: ${{ steps.meta.outputs.deploy_frontend }}
      deploy_backend: ${{ steps.meta.outputs.deploy_backend }}
    steps:
      - name: Resolve deployment metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "deploy_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "deploy_environment=production" >> "$GITHUB_OUTPUT"
            echo "deploy_frontend=true" >> "$GITHUB_OUTPUT"
            echo "deploy_backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "deploy_environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "deploy_frontend=${{ inputs.deploy_frontend }}" >> "$GITHUB_OUTPUT"
            echo "deploy_backend=${{ inputs.deploy_backend }}" >> "$GITHUB_OUTPUT"
          fi

  deploy-frontend:
    needs: prepare
    if: needs.prepare.outputs.deploy_frontend == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.deploy_environment }}
    steps:
      - name: Checkout deployment SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.deploy_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Vercel secrets
        run: |
          test -n "${{ secrets.VERCEL_TOKEN }}" || (echo "Missing secret: VERCEL_TOKEN" && exit 1)
          test -n "${{ secrets.VERCEL_ORG_ID }}" || (echo "Missing secret: VERCEL_ORG_ID" && exit 1)
          test -n "${{ secrets.VERCEL_PROJECT_ID }}" || (echo "Missing secret: VERCEL_PROJECT_ID" && exit 1)

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build and deploy frontend to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel build --prod --token="$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Frontend smoke check (optional)
        env:
          FRONTEND_HEALTHCHECK_URL: ${{ secrets.FRONTEND_HEALTHCHECK_URL }}
        run: |
          if [ -n "${FRONTEND_HEALTHCHECK_URL:-}" ]; then
            curl --fail --show-error --silent "$FRONTEND_HEALTHCHECK_URL"
          else
            echo "Skipping frontend smoke check (FRONTEND_HEALTHCHECK_URL is not set)."
          fi

  deploy-backend:
    needs: prepare
    if: needs.prepare.outputs.deploy_backend == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.deploy_environment }}
    steps:
      - name: Checkout deployment SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.deploy_sha }}

      - name: Trigger backend deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -n "${RENDER_DEPLOY_HOOK_URL:-}" ]; then
            curl --fail --show-error --silent --request POST "$RENDER_DEPLOY_HOOK_URL"
          else
            test -n "$RENDER_API_KEY" || (echo "Missing secret: RENDER_API_KEY (or set RENDER_DEPLOY_HOOK_URL)" && exit 1)
            test -n "$RENDER_SERVICE_ID" || (echo "Missing secret: RENDER_SERVICE_ID (or set RENDER_DEPLOY_HOOK_URL)" && exit 1)
            curl --fail --show-error --silent \
              --request POST \
              --url "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
              --header "accept: application/json" \
              --header "authorization: Bearer $RENDER_API_KEY"
          fi

      - name: Backend readiness check (optional)
        env:
          BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
        run: |
          if [ -z "${BACKEND_HEALTHCHECK_URL:-}" ]; then
            echo "Skipping backend readiness check (BACKEND_HEALTHCHECK_URL is not set)."
            exit 0
          fi
          for i in $(seq 1 30); do
            if curl --fail --show-error --silent "$BACKEND_HEALTHCHECK_URL"; then
              exit 0
            fi
            echo "Waiting for backend readiness ($i/30)..."
            sleep 10
          done
          echo "Backend readiness check failed"
          exit 1
