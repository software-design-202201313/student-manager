services:
  db:
    image: postgres:15-alpine
    container_name: sm-db
    environment:
      POSTGRES_USER: sm
      POSTGRES_PASSWORD: smpass
      POSTGRES_DB: student_manager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sm -d student_manager"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: sm-kafka
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: sm-backend
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://sm:smpass@db:5432/student_manager
      TEST_DATABASE_URL: sqlite+aiosqlite:///./test.db
      SECRET_KEY: change-me-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      INVITE_TOKEN_EXPIRE_HOURS: 72
      PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: 60
      APP_BASE_URL: http://localhost:5173
      AUTH_LINK_DELIVERY: stub
      RUN_SEED: 1
      ALLOWED_ORIGINS: '["http://localhost:5173"]'
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-18000}:8000"
    command: ["/app/docker-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready').read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/seed.py:/app/seed.py
      - ./backend/docker-entrypoint.sh:/app/docker-entrypoint.sh

  frontend:
    image: node:20-alpine
    container_name: sm-frontend
    working_dir: /app
    environment:
      # Vite dev server proxy to backend service in the compose network
      VITE_API_PROXY: http://backend:8000
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  pgdata: {}
  kafkadata: {}
